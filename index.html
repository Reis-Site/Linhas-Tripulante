<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cidade Verde - Painel de Operações</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --verde-primario: #1b4d3e;
            --verde-vibrante: #2ecc71;
            --verde-suave: #f0fdf4;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #e8f5e9, #c8e6c9);
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        /* Navbar Sofisticada */
        .navbar {
            background-color: var(--verde-primario);
            border-bottom: 4px solid var(--verde-vibrante);
            padding: 1.2rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Card Estilo "Cidade Verde" */
        .btn-access {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(27, 77, 62, 0.1);
        }

        .btn-access i {
            font-size: 3rem;
            transition: all 0.4s;
        }

        .btn-access span {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--verde-primario);
        }

        /* Cores Específicas com Gradientes Sutis */
        .btn-util { border-top: 6px solid #27ae60; }
        .btn-util i { color: #27ae60; }

        .btn-sabado { border-top: 6px solid #f39c12; }
        .btn-sabado i { color: #f39c12; }

        .btn-domingo { border-top: 6px solid #e74c3c; }
        .btn-domingo i { color: #e74c3c; }

        /* Efeito de Hover */
        .btn-access:hover {
            transform: translateY(-12px);
            background: var(--verde-primario);
            box-shadow: 0 20px 40px rgba(27, 77, 62, 0.25);
        }

        .btn-access:hover span, 
        .btn-access:hover i {
            color: #ffffff !important;
        }

        .footer-text {
            color: var(--verde-primario);
            font-weight: 500;
            opacity: 0.7;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark">
    <div class="container text-center">
        <span class="navbar-brand mx-auto">
            <i class="bi bi-bus-front-fill me-2"></i> CONSULTA LINHA E TRIPULANTES
        </span>
    </div>
</nav>

<div class="main-container">
    <div class="container">
        <div class="row g-4 justify-content-center">
            
            <div class="col-md-4">
                <a href="Util Tccc.html" target="_blank" class="btn-access btn-util">
                    <i class="bi bi-briefcase"></i>
                    <span>DIA ÚTIL</span>
                </a>
            </div>

            <div class="col-md-4">
                <a href="Sabado Tccc.html" target="_blank" class="btn-access btn-sabado">
                    <i class="bi bi-briefcase"></i>
                    <span>SÁBADOS</span>
                </a>
            </div>

            <div class="col-md-4">
                <a href="Dom - Feriados.html" target="_blank" class="btn-access btn-domingo">
                    <i class="bi bi-briefcase"></i>
                    <span>DOMINGOS E FERIADOS</span>
                </a>
            </div>

        </div>
    </div>
</div>

<footer class="text-center footer-text">
    Sistema de Gestão de Escalas | Cidade Verde
</footer>

</body>
</html>
